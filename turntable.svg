<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="800" height="120">
  <rect width="800" height="120" fill="#000"/>

  <!-- Turntable platter -->
  <g transform="translate(80,60)">
    <!-- Shadow -->
    <circle cx="2" cy="2" r="48" fill="rgba(0,0,0,0.6)"/>
    <!-- Platter base -->
    <circle r="48" fill="#111"/>
    <!-- Grooves -->
    <circle r="44" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.8"/>
    <circle r="38" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.8"/>
    <circle r="32" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.8"/>
    <circle r="26" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.8"/>
    <circle r="20" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.8"/>
    <!-- Color segments -->
    <path d="M0,0 L0,-44 A44,44 0 0,1 38.1,-22 Z" fill="#1ed76018"/>
    <path d="M0,0 L38.1,-22 A44,44 0 0,1 44,0 Z" fill="#9945ff18"/>
    <path d="M0,0 L44,0 A44,44 0 0,1 22,38.1 Z" fill="#0052ff18"/>
    <path d="M0,0 L22,38.1 A44,44 0 0,1 -22,38.1 Z" fill="#d4af3718"/>
    <path d="M0,0 L-22,38.1 A44,44 0 0,1 -44,0 Z" fill="#e5091418"/>
    <path d="M0,0 L-44,0 A44,44 0 0,1 0,-44 Z" fill="#00d4ff18"/>
    <!-- Center label -->
    <circle r="18" fill="#000"/>
    <circle r="18" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>
    <text y="-4" text-anchor="middle" fill="#333" font-size="6" font-family="monospace" font-weight="bold">m1les</text>
    <text y="5" text-anchor="middle" fill="#333" font-size="6" font-family="monospace" font-weight="bold">tones</text>
    <!-- Spindle -->
    <circle r="2.5" fill="#666"/>
    <!-- Tonearm -->
    <line x1="52" y1="-40" x2="10" y2="8" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="8" y="6" width="5" height="4" rx="1" fill="rgba(255,255,255,0.4)"/>
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
  </g>

  <!-- NOW PLAYING text -->
  <text x="148" y="30" fill="#222" font-size="9" font-family="monospace" letter-spacing="3" font-weight="600">NOW PLAYING</text>
  <text x="148" y="52" fill="#ffffff" font-size="16" font-family="monospace" font-weight="bold">Primetime Recording Studio</text>
  <text x="148" y="70" fill="#555" font-size="11" font-family="monospace">Queens, NY  ·  Est. 2009  ·  250+ artists</text>

  <!-- Genre tags -->
  <rect x="148" y="80" width="70" height="16" rx="2" fill="rgba(30,215,96,0.1)" stroke="rgba(30,215,96,0.3)" stroke-width="0.8"/>
  <text x="183" y="92" text-anchor="middle" fill="#1ed760" font-size="8" font-family="monospace" font-weight="600">Hip Hop</text>

  <rect x="226" y="80" width="72" height="16" rx="2" fill="rgba(153,69,255,0.1)" stroke="rgba(153,69,255,0.3)" stroke-width="0.8"/>
  <text x="262" y="92" text-anchor="middle" fill="#9945ff" font-size="8" font-family="monospace" font-weight="600">Reggaeton</text>

  <rect x="306" y="80" width="66" height="16" rx="2" fill="rgba(0,82,255,0.1)" stroke="rgba(0,82,255,0.3)" stroke-width="0.8"/>
  <text x="339" y="92" text-anchor="middle" fill="#0052ff" font-size="8" font-family="monospace" font-weight="600">Bachata</text>

  <rect x="380" y="80" width="80" height="16" rx="2" fill="rgba(212,175,55,0.1)" stroke="rgba(212,175,55,0.3)" stroke-width="0.8"/>
  <text x="420" y="92" text-anchor="middle" fill="#d4af37" font-size="8" font-family="monospace" font-weight="600">Electronic</text>

  <!-- EQ bars -->
  <g transform="translate(680,40)">
    <rect x="0" y="0" width="6" height="40" rx="1" fill="#111"/>
    <rect x="9" y="0" width="6" height="40" rx="1" fill="#111"/>
    <rect x="18" y="0" width="6" height="40" rx="1" fill="#111"/>
    <rect x="27" y="0" width="6" height="40" rx="1" fill="#111"/>
    <rect x="36" y="0" width="6" height="40" rx="1" fill="#111"/>
    <rect x="45" y="0" width="6" height="40" rx="1" fill="#111"/>
    <rect x="54" y="0" width="6" height="40" rx="1" fill="#111"/>

    <rect x="0" y="16" width="6" height="24" rx="1" fill="#1ed760">
      <animate attributeName="height" values="24;10;30;8;20;14;24" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="16;30;10;32;20;26;16" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="9" y="10" width="6" height="30" rx="1" fill="#1ed760">
      <animate attributeName="height" values="30;20;8;35;15;25;30" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="y" values="10;20;32;5;25;15;10" dur="0.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="18" y="20" width="6" height="20" rx="1" fill="#9945ff">
      <animate attributeName="height" values="20;35;12;28;8;32;20" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="y" values="20;5;28;12;32;8;20" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="27" y="8" width="6" height="32" rx="1" fill="#9945ff">
      <animate attributeName="height" values="32;15;38;10;25;20;32" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="8;25;2;30;15;20;8" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="36" y="14" width="6" height="26" rx="1" fill="#0052ff">
      <animate attributeName="height" values="26;38;10;22;35;16;26" dur="1.3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="14;2;30;18;5;24;14" dur="1.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="45" y="18" width="6" height="22" rx="1" fill="#0052ff">
      <animate attributeName="height" values="22;12;36;8;28;18;22" dur="1.0s" repeatCount="indefinite"/>
      <animate attributeName="y" values="18;28;4;32;12;22;18" dur="1.0s" repeatCount="indefinite"/>
    </rect>
    <rect x="54" y="6" width="6" height="34" rx="1" fill="#d4af37">
      <animate attributeName="height" values="34;20;10;38;16;28;34" dur="0.7s" repeatCount="indefinite"/>
      <animate attributeName="y" values="6;20;30;2;24;12;6" dur="0.7s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Bottom rainbow line -->
  <defs>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e50914"/>
      <stop offset="17%" stop-color="#d4af37"/>
      <stop offset="33%" stop-color="#1ed760"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="67%" stop-color="#0052ff"/>
      <stop offset="83%" stop-color="#9945ff"/>
      <stop offset="100%" stop-color="#e50914"/>
    </linearGradient>
  </defs>
  <rect x="0" y="117" width="800" height="3" fill="url(#rainbow)"/>
</svg>
